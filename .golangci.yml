version: "2"

run:
  timeout: 5m
  tests: false

linters:
  default: all
  disable:
    # need to try on
    - promlinter
    - wrapcheck
    # too much false positive / opinionated
    - depguard
    - lll
    - wsl
    - wsl_v5
    - tagliatelle
    - exhaustruct
    - nlreturn
    - varnamelen
    - noinlineerr
    # v2 default rule set is too strict for the existing API-doc style;
    # tracked separately
    - revive
  exclusions:
    generated: lax
    paths:
      - vendor
      - .*/mocks/.*
