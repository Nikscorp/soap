version: "3"
services:
  soap:
    image: ghcr.io/nikscorp/soap:latest
    container_name: soap
    logging: &default_logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped
    ports:
      - "127.0.0.1:8202:8080"
    networks:
      - monitoring_default
    command: "/srv/soap -c /srv/config/config.yaml"
    volumes:
      - ./config:/srv/config
      # Persist the IMDb dataset cache between container restarts. Only
      # used when LAZYSOAP_RATINGS_SOURCE=imdb; harmless otherwise. The
      # container path matches the default imdb.cache_dir
      # (./var/imdb resolves to /var/imdb because the base image has no
      # WORKDIR set, so CWD is /).
      - imdb-cache:/var/imdb

networks:
  monitoring_default:
    external: true

volumes:
  imdb-cache: {}
