name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the Docker images
        run: docker compose build
      - name: Create config
        run: cp config/config.yaml.dist config/config.yaml
      - name: Launch backend
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: docker compose up -d
      - name: Run simple test
        run: curl http://127.0.0.1:8202/search/lost
      - name: Run simple test2
        run: curl http://127.0.0.1:8202/id/4607
      - name: Show logs
        run: docker compose logs
      - name: Stop backend
        run: docker compose stop
  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:ci
      - name: Build
        run: npm run build
  test:
    name: Test with Coverage
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.2'
    - name: Check out code
      uses: actions/checkout@v4
    - name: Run Unit tests
      run: |
        go test -race -covermode atomic -coverprofile=covprofile ./internal/...
    - name: Strip non-source paths from coverage profile
      # Drop generated mocks (go:generate minimock) — they have no behavior of
      # our own and otherwise dominate the profile, deflating reported coverage.
      run: |
        grep -v -E '/mocks/' covprofile > covprofile.filtered
        mv covprofile.filtered covprofile
        go tool cover -func=covprofile | tail -1
    - name: Install goveralls
      run: go install github.com/mattn/goveralls@latest
    - name: Send coverage
      env:
        COVERALLS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: goveralls -coverprofile=covprofile -service=github
